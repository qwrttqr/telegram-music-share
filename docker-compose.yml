services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./backend
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      DB_DEFAULT: ${DB_DEFAULT}
      PHP_IDE_CONFIG: "serverName=Docker Nginx"
    depends_on:
      - mariadb
    extra_hosts:
    - "host.docker.internal:host-gateway"
    networks:
      - app-network

  mariadb:
    image: mariadb:11.2
    container_name: telegram-music-db
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - telegram_music_app_db_data:/var/lib/mysql
      - ./docker/mariadb:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - app-network

networks:
  app-network:

volumes:
  telegram_music_app_db_data: